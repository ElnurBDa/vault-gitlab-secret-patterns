# .gitlab-ci.yml
deploy:
  stage: deploy
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "openbao"   # must match bound_audiences on the JWT role
  before_script:
    - apk add --no-cache curl jq   # the docker:24 runner image is minimal
    # --- Vault auth via JWT ---
    - |
      VAULT_TOKEN=$(curl -sf \
        --data "{\"jwt\":\"${VAULT_ID_TOKEN}\",\"role\":\"app-vault-env\"}" \
        ${VAULT_ADDR}/v1/auth/jwt/login | jq -r '.auth.client_token')
      if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then echo "ERROR: Vault auth failed"; exit 1; fi
      export VAULT_TOKEN

    # --- Read secrets ---
    - |
      SECRETS=$(curl -sf \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        ${VAULT_ADDR}/v1/secret/data/app-vault-env/prod)
      export APP_USERNAME=$(echo "$SECRETS" | jq -r '.data.data.APP_USERNAME')
      export APP_PASSWORD=$(echo "$SECRETS" | jq -r '.data.data.APP_PASSWORD')

    # --- SSH setup ---
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts

  script:
    - scp -P ${PROD_PORT:-22} -r Dockerfile server.js package.json $PROD_USER@$PROD_HOST:~/env-debug-3
    - |
      ssh -p ${PROD_PORT:-22} $PROD_USER@$PROD_HOST bash << EOF
      set -e
      mkdir -p env-debug-3
      cd env-debug-3
      docker build -t env-debug-3:latest .
      docker rm -f env-debug-3 2>/dev/null || true
      docker run -d \
        --name env-debug-3 \
        --restart unless-stopped \
        -p 82:82 \
        -e APP_USERNAME=$APP_USERNAME \
        -e APP_PASSWORD=$APP_PASSWORD \
        env-debug-3:latest
      docker image prune -f
      docker ps --filter name=env-debug-3
      EOF
